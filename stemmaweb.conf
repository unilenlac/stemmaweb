# rename this file to stemmaweb.yml and put a ':' after 'name' if
# you want to use YAML like in old versions of Catalyst
name = stemmaweb
<Component Controller::Stexaminer>
    idp_solver_url http://stemmaweb.net/cgi-bin/graphcalc.cgi
</Component>
<Component Controller::Stemweb>
    pars_path /somewhere/dependencies_local/phylip-win-3.698/exe/pars.exe
</Component>
<Model Directory>
    tradition_repo http://ftsr-dev.unil.ch:7070/stemmarest/api
   <basic_auth>
   	realm basic-auth-realm
   	user  user 
   	pass  userpass
   </basic_auth>
</Model>
<Component Controller::Sbridge>
    # Note: 172.17.0.1 is the default Docker bridge IP to reach the host. 
    # If this doesn't work, try host.docker.internal or your actual IP address such as http://localhost:8000
    sbridge_url http://host.docker.internal:8000
</Component>
<Model Userdir>
    dsn dbi:SQLite:dbname=db/traditions.db
</Model>
<Authentication::Credential::Google>
    public_cert_url https://www.googleapis.com/oauth2/v1/certs
    client_id 12345
</Authentication::Credential::Google>
<Registration>
    no_recaptcha 1
</Registration>
<recaptcha>
    pub_key 6Len7a0mAAAAAKXkN7soy0oc4BQwFwTmD32HP56j
    priv_key 6Len7a0mAAAAAMVcKOne-D_cehQHVTsVPXL_LYu9
    version v2
</recaptcha>
